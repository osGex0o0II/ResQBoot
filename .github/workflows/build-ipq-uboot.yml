name: Build U-Boot for IPQ Devices

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      ipq_type:
        description: 'Please select the IPQ type(s) to build. for example: ipq6018,ipq807x,all = all types.'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - ipq40xx
          - ipq5018
          - ipq5332
          - ipq6018
          - ipq806x
          - ipq807x
          - ipq9574

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      TZ: Asia/Shanghai
      NODE_VERSION: '24'
      SHOULD_RUN_STEP: "github.event_name != 'workflow_dispatch' || inputs.ipq_type == 'all' || inputs.ipq_type == matrix.ipq_type"
      TOOLCHAIN: "https://github.com/1980490718/toolchain-arm_cortex-a7_gcc-5.2.0.git"
      DEPENDENCIES: "build-essential libncurses5-dev gawk git gettext libssl-dev python3 wget cpio flex bison bc rsync zopfli device-tree-compiler"

    strategy:
      matrix:
        ipq_type: ['ipq40xx', 'ipq5018', 'ipq5332', 'ipq6018', 'ipq806x', 'ipq807x', 'ipq9574']
      fail-fast: false

    if: github.event_name != 'workflow_dispatch' || inputs.ipq_type == 'all'

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Show current timezone and time
        run: |
          echo "Current timezone: $(timedatectl show -p Timezone --value)"
          echo "Current time: $(date '+%Y-%m-%d %H:%M:%S %Z')"

      - name: Setup Node.js 24
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ${{ env.DEPENDENCIES }}

      - name: Install Node.js packages(minifier, css, js, terser) for Web interface compression
        run: sudo npm install -g html-minifier-terser clean-css terser

      - name: Clone Toolchain to staging_dir
        run: |
          git clone --depth=1 ${{ env.TOOLCHAIN }} ../staging_dir
          echo "Clone Toolchain to staging_dir"
          ls -la ../staging_dir/
          if [ -d "../staging_dir/toolchain-arm_cortex-a7_gcc-5.2.0_musl-1.1.16_eabi/bin" ]; then
            echo "Toolchain bin path verified"
          else
            echo "Warning: Expected path not found"
            find ../staging_dir -name "*gcc*" | head -10
          fi

      - name: Build ${{ matrix.ipq_type }} U-Boot
        if: |
          ${{ env.SHOULD_RUN_STEP }}
        run: ./build.sh ${{ matrix.ipq_type }}

      - name: Upload compiled artifacts (bin directory)
        if: |
          ${{ env.SHOULD_RUN_STEP }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: u-boot-${{ matrix.ipq_type }}
          path: bin/
          retention-days: 30

      - name: Show bin directory content
        if: |
          ${{ env.SHOULD_RUN_STEP }}
        run: |
          echo " ${{ matrix.ipq_type }} Build completed!"
          ls -la bin/ || echo "bin directory is empty"

  release:
    name: Create Release
    needs: build
    if: success() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install GitHub CLI and jq
        run: |
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y gh jq

      - name: Download all build artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts
          pattern: u-boot-*
          merge-multiple: true

      - name: Confirm current timezone is Asia/Shanghai
        run: |
          echo "Current timezone: $(timedatectl show -p Timezone --value)"
          echo "Current time: $(date '+%Y-%m-%d %H:%M:%S %Z')"

      - name: Set TODAY and BUILD_TIME environment variables
        run: |
          echo "TODAY=$(date +%Y-%m-%d)" >> $GITHUB_ENV
          echo "BUILD_TIME=$(date '+%H:%M:%S')" >> $GITHUB_ENV
          echo "FULL_BUILD_TIME=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV

      - name: Check and delete all published content on Releases page
        run: |
          echo "Check Releases page today (${{ env.TODAY }})..."
          echo "Current time: $(date '+%Y-%m-%d %H:%M:%S %Z')"

          # Calculate today's 00:00:00 and 23:59:59 timestamps (UTC)
          TODAY_START="${{ env.TODAY }} 00:00:00"
          TODAY_END="${{ env.TODAY }} 23:59:59"
          echo "Today's time range: $TODAY_START - $TODAY_END"

          # View all releases for debugging
          echo "All Releases list:"
          gh release list --limit 10

          # Get JSON formatted releases data
          RELEASE_JSON=$(gh release list --limit 100 --json tagName,createdAt)
          echo "JSON output (first 1000 characters):"
          echo "$RELEASE_JSON" | head -c 1000

          # Filter today's releases between today's start and end timestamps
          echo "Filter today's Releases:"
          # Use startswith to match date
          TODAY_TAGS=$(echo "$RELEASE_JSON" | jq -r --arg date "${{ env.TODAY_ISO }}" '.[] | select(.createdAt | startswith($date)) | .tagName')
          echo "Today's Tags: $TODAY_TAGS"

          if [ -n "$TODAY_TAGS" ]; then
            echo "Found published Releases today, deleting all..."
            echo "$TODAY_TAGS"
            echo "$TODAY_TAGS" | xargs -I {} gh release delete {} --yes --cleanup-tag
            echo "All today's Releases deleted completed!"
          else
            echo "Releases page today is empty"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create new GitHub Release
        uses: softprops/action-gh-release@v3.0.1
        with:
          tag_name: v${{ env.TODAY }}
          name: v${{ env.TODAY }}
          body: |
            Compiled U-Boot IPQ platforms:
            Build Time：${{ env.FULL_BUILD_TIME }} ${{ env.TZ }}
            Types：ipq40xx、ipq5018、ipq5332、ipq6018、ipq806x、ipq807x、ipq9574
          files: artifacts/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
