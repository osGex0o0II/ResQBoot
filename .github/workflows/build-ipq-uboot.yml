name: Build U-Boot for IPQ Devices

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      ipq_type:
        description: 'Please select the IPQ type(s) to build. for example: ipq6018,ipq807x,all = all types.'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - ipq40xx
          - ipq5018
          - ipq5332
          - ipq6018
          - ipq806x
          - ipq807x
          - ipq9574

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      TZ: Asia/Shanghai
      NODE_VERSION: '24'
      SHOULD_RUN_STEP: "github.event_name != 'workflow_dispatch' || inputs.ipq_type == 'all' || inputs.ipq_type == matrix.ipq_type"
      TOOLCHAIN: "https://github.com/1980490718/toolchain-arm_cortex-a7_gcc-5.2.0.git"
      DEPENDENCIES: "build-essential libncurses5-dev gawk git gettext libssl-dev python3 wget cpio flex bison bc rsync zopfli device-tree-compiler"

    strategy:
      matrix:
        ipq_type: ['ipq40xx', 'ipq5018', 'ipq5332', 'ipq6018', 'ipq806x', 'ipq807x', 'ipq9574']
      fail-fast: false

    if: github.event_name != 'workflow_dispatch' || inputs.ipq_type == 'all'

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Show current timezone and time
        run: |
          echo "Current timezone: $(timedatectl show -p Timezone --value)"
          echo "Current time: $(date '+%Y-%m-%d %H:%M:%S %Z')"

      - name: Check device metadata
        run: python3 scripts/check_devices.py

      - name: Setup Node.js 24
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ${{ env.DEPENDENCIES }}

      - name: Install Node.js packages(minifier, css, js, terser) for Web interface compression
        run: sudo npm install -g html-minifier-terser clean-css terser

      - name: Clone Toolchain to staging_dir
        run: |
          git clone --depth=1 ${{ env.TOOLCHAIN }} ../staging_dir
          echo "Clone Toolchain to staging_dir"
          ls -la ../staging_dir/
          if [ -d "../staging_dir/toolchain-arm_cortex-a7_gcc-5.2.0_musl-1.1.16_eabi/bin" ]; then
            echo "Toolchain bin path verified"
          else
            echo "Warning: Expected path not found"
            find ../staging_dir -name "*gcc*" | head -10
          fi

      - name: Build ${{ matrix.ipq_type }} U-Boot
        if: |
          ${{ env.SHOULD_RUN_STEP }}
        run: ./build.sh ${{ matrix.ipq_type }}

      - name: Upload compiled artifacts (bin directory)
        if: |
          ${{ env.SHOULD_RUN_STEP }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: u-boot-${{ matrix.ipq_type }}
          path: bin/
          retention-days: 30

      - name: Show bin directory content
        if: |
          ${{ env.SHOULD_RUN_STEP }}
        run: |
          echo " ${{ matrix.ipq_type }} Build completed!"
          ls -la bin/ || echo "bin directory is empty"

  release:
    name: Create Release
    needs: build
    if: success() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    env:
      TZ: Asia/Shanghai

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install GitHub CLI and jq
        run: |
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y gh jq

      - name: Download all build artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts
          pattern: u-boot-*
          merge-multiple: true

      - name: Confirm current timezone is Asia/Shanghai
        run: |
          echo "Current timezone: $(timedatectl show -p Timezone --value)"
          echo "Current time: $(date '+%Y-%m-%d %H:%M:%S %Z')"

      - name: Set TODAY and BUILD_TIME environment variables
        run: |
          echo "TODAY=$(date +%Y-%m-%d)" >> $GITHUB_ENV
          echo "BUILD_TIME=$(date '+%H:%M:%S')" >> $GITHUB_ENV
          echo "FULL_BUILD_TIME=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV

      - name: Prepare release assets
        run: python3 scripts/prepare_release_assets.py --artifacts-dir artifacts --output-dir release-assets --body release-notes.md

      - name: Delete existing release for current tag
        run: |
          TARGET_TAG="v${{ env.TODAY }}"
          echo "Check Release tag: $TARGET_TAG"
          echo "Current time: $(date '+%Y-%m-%d %H:%M:%S %Z')"

          if gh release view "$TARGET_TAG" >/dev/null 2>&1; then
            echo "Found existing Release $TARGET_TAG, deleting it before publishing fresh assets..."
            gh release delete "$TARGET_TAG" --yes --cleanup-tag
            echo "Release $TARGET_TAG deleted."
          else
            echo "Release $TARGET_TAG does not exist."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create new GitHub Release
        uses: softprops/action-gh-release@v3.0.1
        with:
          tag_name: v${{ env.TODAY }}
          name: v${{ env.TODAY }}
          body_path: release-notes.md
          files: release-assets/*
          fail_on_unmatched_files: true
          overwrite_files: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
