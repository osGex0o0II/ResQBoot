<!DOCTYPE html>
<html lang="zh">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>U-BOOT控制台</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<div class="main-container">
		<aside class="sidebar">
			<ul class="sidebar-nav">
				<li class="sidebar-nav-item active"><a href="firmware.html" target="content-frame">更新固件</a></li>
				<li class="sidebar-nav-item"><a href="uboot.html" target="content-frame">更新U-BOOT</a></li>
				<li class="sidebar-nav-item"><a href="art.html" target="content-frame">更新ART</a></li>
				<li class="sidebar-nav-item"><a href="cdt.html" target="content-frame">更新CDT</a></li>
				<li class="sidebar-nav-item"><a href="ptable.html" target="content-frame">更新分区表</a></li>
				<li class="sidebar-nav-item"><a href="initramfs.html" target="content-frame">内存启动</a></li>
					<li class="sidebar-nav-item"><a href="backup.html" target="content-frame">备份分区</a></li>
					<li class="sidebar-nav-item"><a href="term.html" target="content-frame">终端变量</a></li>
				<li class="sidebar-nav-item"><a href="javascript:void(0)" id="rebootBtn">重启设备</a></li>
			</ul>
			<div class="theme-switch" id="themeSwitch" title="切换主题">
				<div class="theme-track"><div class="theme-thumb"></div></div>
			</div>
		</aside>
		<div class="content-frame-wrapper">
			<iframe name="content-frame" id="content-frame" src="firmware.html" class="content-frame"></iframe>
		</div>
	</div>
	<div class="additional-links">
		<p class="link-tip">获取更多信息:<a href="https://github.com/osGex0o0II/ResQBoot" target="_blank">GitHub</a> | Version:</p>
	</div>
	<script>
		(function () {
			var frame = document.getElementById('content-frame');
			var items = document.querySelectorAll('.sidebar-nav-item');
			var links = document.querySelectorAll('.sidebar-nav-item a');
			links.forEach(function (a) {
				a.addEventListener('click', function () {
					items.forEach(function (li) { li.classList.remove('active'); });
				a.parentElement.classList.add('active');
				});
			});
			frame.addEventListener('load', function () {
				try {
					var title = frame.contentDocument.title;
					if (title) document.title = title;
				} catch (e) {}
			});

			var saved = localStorage.getItem('theme') || '';
			if (saved === 'light' || saved === 'dark') document.documentElement.setAttribute('data-theme', saved);

			function apply(el, v) {
				(v === 'light' || v === 'dark') ? el.setAttribute('data-theme', v) : el.removeAttribute('data-theme');
			}

			function effectiveTheme() {
				var explicit = document.documentElement.getAttribute('data-theme');
				if (explicit) return explicit;
				return window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
			}

			function syncTheme() {
				var theme = document.documentElement.getAttribute('data-theme') || '';
				try { apply(frame.contentDocument.documentElement, theme); } catch (e) {}
				try { frame.contentWindow.postMessage({type: 'theme', theme: theme}, '*'); } catch (e) {}
			}

			document.getElementById('themeSwitch').addEventListener('click', function () {
				var theme = effectiveTheme() === 'light' ? 'dark' : 'light';
				apply(document.documentElement, theme);
				localStorage.setItem('theme', theme);
				syncTheme();
			});

			frame.addEventListener('load', syncTheme);
			syncTheme();

			document.getElementById('rebootBtn').addEventListener('click', function () {
				if (confirm('确认重启？')) fetch('/webterm/cmd', {method:'POST',headers:{'Content-Type':'text/plain'},body:'reset'});
			});
		})();
	</script>
</body>
</html>
